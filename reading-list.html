<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading List | Aaqib Bhat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 60px 24px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 48px;
      font-family: 'Arial', sans-serif;
    }

    .category {
      margin-bottom: 40px;
    }

    .category-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      font-family: 'Arial', sans-serif;
      margin-bottom: 12px;
    }

    .resource {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #1e1e1e;
      text-decoration: none;
      color: inherit;
      transition: color 0.2s;
    }

    .resource:hover { color: #ffffff; }
    .resource:hover .arrow { opacity: 1; }

    .resource-name {
      font-size: 1rem;
      font-family: 'Arial', sans-serif;
      color: #cccccc;
    }

    .resource:hover .resource-name { color: #ffffff; }

    .resource-tag {
      font-size: 0.75rem;
      color: #444;
      font-family: 'Arial', sans-serif;
    }

    .arrow {
      font-size: 0.8rem;
      color: #555;
      opacity: 0;
      transition: opacity 0.2s;
      margin-left: 12px;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reading List</h1>
    <p class="subtitle">Resources I read regularly to stay sharp.</p>

    <div class="category">
      <div class="category-label">SEO</div>

      <a href="https://backlinko.com/blog" target="_blank" class="resource">
        <span class="resource-name">Backlinko</span>
        <span class="right">
          <span class="resource-tag">Brian Dean</span>
          <span class="arrow">↗</span>
        </span>
      </a>

      <a href="https://ahrefs.com/blog" target="_blank" class="resource">
        <span class="resource-name">Ahrefs Blog</span>
        <span class="right">
          <span class="resource-tag">In-depth SEO</span>
          <span class="arrow">↗</span>
        </span>
      </a>

      <a href="https://moz.com/blog" target="_blank" class="resource">
        <span class="resource-name">Moz Blog</span>
        <span class="right">
          <span class="resource-tag">Whiteboard Friday</span>
          <span class="arrow">↗</span>
        </span>
      </a>

      <a href="https://developers.google.com/search" target="_blank" class="resource">
        <span class="resource-name">Google Search Central</span>
        <span class="right">
          <span class="resource-tag">Technical</span>
          <span class="arrow">↗</span>
        </span>
      </a>
    </div>

    <div class="category">
      <div class="category-label">News & Updates</div>

      <a href="https://searchengineland.com" target="_blank" class="resource">
        <span class="resource-name">Search Engine Land</span>
        <span class="right">
          <span class="resource-tag">Industry News</span>
          <span class="arrow">↗</span>
        </span>
      </a>
    </div>

    <div class="category">
      <div class="category-label">Marketing & Growth</div>

      <a href="https://academy.hubspot.com" target="_blank" class="resource">
        <span class="resource-name">HubSpot Academy</span>
        <span class="right">
          <span class="resource-tag">Marketing</span>
          <span class="arrow">↗</span>
        </span>
      </a>

      <a href="https://neilpatel.com/blog" target="_blank" class="resource">
        <span class="resource-name">Neil Patel's Blog</span>
        <span class="right">
          <span class="resource-tag">Growth</span>
          <span class="arrow">↗</span>
        </span>
      </a>
    </div>

  </div>
</body>
</html>
