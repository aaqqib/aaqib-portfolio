  <script>
  // ── POST RENDERER ───────────────────────────────────────
  // Gets the slug from URL, fetches the raw HTML file,
  // parses frontmatter + markdown, renders everything

  async function loadPost() {
    // Get slug from URL ?slug=post-name or from pathname
    const params = new URLSearchParams(window.location.search);
    let slug = params.get('slug');

    // If no slug param, try to get from pathname
    if (!slug) {
      const path = window.location.pathname;
      const parts = path.split('/');
      slug = parts[parts.length - 1].replace('.html', '');
    }

    if (!slug || slug === 'post') {
      showError('No post specified.');
      return;
    }

    try {
      // Fetch the raw blog post file
      const res = await fetch(`/blog/${slug}.html`);
      if (!res.ok) throw new Error('Post not found');

      const raw = await res.text();

      // Parse frontmatter
      const fm = parseFrontmatter(raw);

      // Set page title
      document.title = `${fm.title} — Aaqib Bhat`;
      document.getElementById('meta-desc').setAttribute('content', fm.description || '');

      // Fill hero
      document.getElementById('post-title').textContent = fm.title || 'Untitled';
      document.getElementById('post-category').textContent = fm.category || 'SEO';
      document.getElementById('post-intro').textContent = fm.description || '';

      if (fm.date) {
        const d = new Date(fm.date);
        const readTime = estimateReadTime(fm.body);
        document.getElementById('post-date').textContent =
          `${readTime} min read · ${d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}`;
      }

      // Render body markdown → HTML
      if (fm.body) {
        const rendered = marked.parse(fm.body);
        document.getElementById('post-body').innerHTML = rendered + authorBox();
      } else {
        document.getElementById('post-body').innerHTML = '<p>No content found.</p>';
      }

    } catch (err) {
      showError('Post not found. <a href="../blog.html" style="color:var(--accent)">Back to blog →</a>');
    }
  }

  function parseFrontmatter(raw) {
    // Match --- frontmatter --- block
    const match = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    if (!match) {
      // No frontmatter — try to extract from HTML
      return extractFromHTML(raw);
    }

    const yamlStr = match[1];
    const body = match[2].trim();
    const data = { body };

    yamlStr.split('\n').forEach(line => {
      const colonIdx = line.indexOf(':');
      if (colonIdx === -1) return;
      const key = line.slice(0, colonIdx).trim();
      let val = line.slice(colonIdx + 1).trim();
      // Remove quotes
      val = val.replace(/^["']|["']$/g, '');
      data[key] = val;
    });

    return data;
  }

  function extractFromHTML(html) {
    // Fallback for hand-written HTML posts
    const titleMatch = html.match(/<h1[^>]*class="article-title"[^>]*>(.*?)<\/h1>/);
    const descMatch = html.match(/<meta name="description" content="(.*?)"/);
    const categoryMatch = html.match(/class="blog-tag"[^>]*>(.*?)<\/span>/);
    const introMatch = html.match(/class="article-intro"[^>]*>(.*?)<\/p>/s);
    const bodyMatch = html.match(/class="article-content"[^>]*>([\s\S]*?)<\/div>/);

    return {
      title: titleMatch ? titleMatch[1] : 'Post',
      description: descMatch ? descMatch[1] : '',
      category: categoryMatch ? categoryMatch[1] : 'SEO',
      body: null,
      _rawHTML: bodyMatch ? bodyMatch[1] : html
    };
  }

  function estimateReadTime(text) {
    if (!text) return 5;
    const words = text.trim().split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 200));
  }

  function authorBox() {
    return `
      <div class="article-author">
        <div class="author-avatar">
          <img src="../assets/photo.jpg" alt="Aaqib Bhat"
            onerror="this.style.display='none';this.parentElement.innerHTML='AB'" />
        </div>
        <div>
          <div class="author-name">Aaqib Bhat</div>
          <div class="author-bio">SEO Specialist based in Kashmir. I help travel agencies and e-commerce brands grow organic traffic and rank on Page 1 of Google.</div>
        </div>
      </div>
    `;
  }

  function showError(msg) {
    document.getElementById('post-title').textContent = 'Oops.';
    document.getElementById('post-body').innerHTML = `<p>${msg}</p>`;
  }

  loadPost();
  </script>
